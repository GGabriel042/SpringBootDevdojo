spring:
  config:
    import:
      - optional:classpath:.env[.properties]
  application:
    name:
      anime-service
  datasource:
    url: jdbc:mysql://localhost:3306/anime_service?useTimezone=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${ENV_ROOT_USER:root}
    password: ${ENV_ROOT_PASSWORD:root123}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  threads:
    virtual:
      enabled: true

  output:
    ansi:
      enabled: ALWAYS

logging:
    level:
      academy.devdojo: debug

server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 20
  error:
    include-stacktrace: ON_PARAM

