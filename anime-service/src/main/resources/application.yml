spring:
  application:
    name:
      anime-service
  threads:
    virtual:
      enabled: true

  output:
    ansi:
      enabled: ALWAYS

  datasource:
    url: ${DB_URL:localhost}:${DB_PORT:3306}
    username: ${LOCAL_USERNAME:root}
    password: ${LOCAL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver

logging:
    level:
      academy.devdojo: debug

server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 20
  error:
    include-stacktrace: ON_PARAM

