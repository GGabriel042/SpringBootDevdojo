spring:
  application:
    name:
      anime-service
  threads:
    virtual:
      enabled: true

  output:
    ansi:
      enabled:
        ALWAYS
  web:
    error:
      include-stacktrace: ON_PARAM

logging:
    level:
      academy.devdojo: debug

server:
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 20




