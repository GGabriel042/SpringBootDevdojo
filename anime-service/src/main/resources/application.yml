spring:
  application:
    name:
      anime-service
  threads:
    virtual:
      enabled: true

  output:
    ansi:
      enabled: ALWAYS


logging:
    level:
      academy.devdojo: debug

server:
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 20
  error:
    include-stacktrace: ON_PARAM





